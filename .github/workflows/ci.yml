name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  core:
    name: Core build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Test Saikara.Core
        run: dotnet test tests/Saikara.Core.Tests/Saikara.Core.Tests.csproj --configuration Release --nologo

  windows:
    name: Solution build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Build solution
        run: dotnet build saikara.sln --configuration Release --nologo
